<!-- ================= LOGIN.HTML ================= -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fresh Air Login</title>
  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
      linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
      url('images/hero.jpg') center/cover no-repeat;
    }

    .container{
      width:400px;
      background:white;
      padding:40px 35px;
      border-radius:20px;
      box-shadow:0 10px 40px rgba(0,0,0,0.3);
    }

    h1{
      text-align:center;
      color:#0a571c;
      margin-bottom:10px;
      font-size:34px;
    }

    .subtitle{
      text-align:center;
      color:#666;
      margin-bottom:25px;
    }

    .tabs{
      display:flex;
      margin-bottom:25px;
      border-radius:10px;
      overflow:hidden;
    }

    .tab-btn{
      flex:1;
      padding:12px;
      border:none;
      cursor:pointer;
      font-size:16px;
      font-weight:600;
      background:#eee;
      transition:0.3s;
    }

    .tab-btn.active{
      background:linear-gradient(45deg,#0a571c,#00d084);
      color:white;
    }

    .form{
      display:none;
    }

    .form.active{
      display:block;
    }

    .input-box{
      margin-bottom:18px;
    }

    .input-box label{
      display:block;
      margin-bottom:8px;
      font-weight:600;
      color:#333;
    }

    .input-box input{
      width:100%;
      padding:14px;
      border:1px solid #ccc;
      border-radius:10px;
      font-size:15px;
      outline:none;
    }

    .input-box input:focus{
      border-color:#00d084;
      box-shadow:0 0 8px rgba(0,208,132,0.3);
    }

    .main-btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:linear-gradient(45deg,#0a571c,#00d084);
      color:white;
      font-size:17px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
    }

    .main-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 8px 20px rgba(0,0,0,0.2);
    }

    .message{
      text-align:center;
      margin-top:15px;
      font-weight:600;
    }

    .success{
      color:green;
    }

    .error{
      color:red;
    }

  </style>
</head>
<body>

  <div class="container">

    <h1>Fresh Air</h1>
    <p class="subtitle">Register and Login</p>

    <div class="tabs">
      <button class="tab-btn active" onclick="showLogin()">Login</button>
      <button class="tab-btn" onclick="showRegister()">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="loginForm" class="form active">

      <div class="input-box">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="Enter email">
      </div>

      <div class="input-box">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter password">
      </div>

      <button class="main-btn" onclick="loginUser()">
        Login
      </button>

    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" class="form">

      <div class="input-box">
        <label>Email</label>
        <input type="email" id="registerEmail" placeholder="Create email">
      </div>

      <div class="input-box">
        <label>Password</label>
        <input type="password" id="registerPassword" placeholder="Create password">
      </div>

      <button class="main-btn" onclick="registerUser()">
        Register
      </button>

    </div>

    <div id="message" class="message"></div>

  </div>

  <script>

    // If already logged in
    const loggedInUser =
    localStorage.getItem("loggedInUser");

    if(loggedInUser){
      window.location.href = "index.html";
    }

    // Get registered users
    let users =
    JSON.parse(localStorage.getItem("users")) || [];

    // Show Login
    function showLogin(){

      document.getElementById("loginForm")
      .classList.add("active");

      document.getElementById("registerForm")
      .classList.remove("active");

      document.querySelectorAll(".tab-btn")[0]
      .classList.add("active");

      document.querySelectorAll(".tab-btn")[1]
      .classList.remove("active");

    }

    // Show Register
    function showRegister(){

      document.getElementById("registerForm")
      .classList.add("active");

      document.getElementById("loginForm")
      .classList.remove("active");

      document.querySelectorAll(".tab-btn")[1]
      .classList.add("active");

      document.querySelectorAll(".tab-btn")[0]
      .classList.remove("active");

    }

    // Register User
    function registerUser(){

      const email =
      document.getElementById("registerEmail").value;

      const password =
      document.getElementById("registerPassword").value;

      const message =
      document.getElementById("message");

      if(email === "" || password === ""){

        message.innerHTML =
        "<span class='error'>Please fill all fields ❌</span>";

        return;

      }

      const userExists =
      users.find(user => user.email === email);

      if(userExists){

        message.innerHTML =
        "<span class='error'>Email already registered ❌</span>";

        return;

      }

      users.push({
        email: email,
        password: password
      });

      localStorage.setItem(
        "users",
        JSON.stringify(users)
      );

      message.innerHTML =
      "<span class='success'>Registration Successful ✅</span>";

      document.getElementById("registerEmail").value = "";
      document.getElementById("registerPassword").value = "";

      setTimeout(() => {
        showLogin();
      },1000);

    }

    // Login User
    function loginUser(){

      const email =
      document.getElementById("loginEmail").value;

      const password =
      document.getElementById("loginPassword").value;

      const message =
      document.getElementById("message");

      const validUser =
      users.find(user =>
        user.email === email &&
        user.password === password
      );

      if(validUser){

        localStorage.setItem(
          "loggedInUser",
          email
        );

        message.innerHTML =
        "<span class='success'>Login Successful ✅</span>";

        setTimeout(() => {
          window.location.href = "index.html";
        },1500);

      }

      else{

        message.innerHTML =
        "<span class='error'>Invalid Email or Password ❌</span>";

      }

    }

  </script>

</body>
</html>
