<!-- Contact Section -->
<section class="contact-section">

  <h1 class="contact-title">Support Form</h1>

  <!-- Top Cards -->
  <div class="contact-cards">
    <div class="contact-card">
      <h3>📞 PHONE</h3>
      <p>8287885685</p>
      <a href="tel:8287885685">Get in Touch</a>
    </div>

    <div class="contact-card">
      <h3>📧 EMAIL</h3>
      <p>info@freshair.com</p>
      <a href="mailto:info@freshair.com">Get in Touch</a>
    </div>

    <div class="contact-card">
      <h3>📍 LOCATION</h3>
      <p>Gurugram, Haryana</p>
      <a href="https://maps.google.com/?q=Gurugram,Haryana" target="_blank">Get in Touch</a>
    </div>
  </div>

  <!-- Form + Image -->
  <div class="contact-container">

    <div class="contact-left">
      <img src="images/contact.jpeg" alt="">
    </div>

    <div class="contact-right">
      <h2>Talk To Our Expert.</h2>

      <form id="contactForm">

        <div class="row">
          <input type="text" placeholder="Enter Name" required>
          <input type="text" placeholder="Enter Phone Number" required>
        </div>

        <input type="email" placeholder="Enter Email ID" required>

        <div class="row">
          <input type="text" placeholder="Subject" required>
          <input type="text" placeholder="Enter Location" required>
        </div>

        <textarea placeholder="Write here..." required></textarea>

        <button type="submit">Submit</button>
      </form>
    </div>

  </div>

</section>
